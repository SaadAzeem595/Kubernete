apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nodedb-app
spec:
  replicas: 1 # Set to 1 for now to avoid the "Split-Brain" DB issue
  selector:
    matchLabels:
      app: nodedb-app
  template:
    metadata:
      labels:
        app: nodedb-app
    spec:
      containers:
      - name: frontend
        image: saadazeem786/testapp:latest1 # This is your React app
        ports:
        - containerPort: 3000

      - name: backend
        image: your-docker-username/your-backend-image:latest # Add your BACKEND image here
        ports:
        - containerPort: 5000 # Assuming backend runs on 5000

      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: service-backend # Rename to be specific
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 5000 # Point this to the BACKEND port (5000)
  selector:
    app: nodedb-app
  type: LoadBalancer