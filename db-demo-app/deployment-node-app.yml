apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nodedb-app
spec:
  replicas: 1 # Set to 1 for now to avoid the "Split-Brain" DB issue
  selector:
    matchLabels:
      app: nodedb-app
  template:
    metadata:
      labels:
        app: nodedb-app
    spec:
      containers:

      containers:
        - name: backend
          image: saadazeem786/testapp:latest1
          command: ["node", "index.js"]
          ports:
            - containerPort: 3000

        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: service-backend # Rename to be specific
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 3000 # Point this to the BACKEND port (5000)
  selector:
    app: nodedb-app
  type: LoadBalancer


