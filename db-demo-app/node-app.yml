apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: saadazeem786/testapp:latest2
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: node-app-service  # Changed name slightly to avoid confusion with deployment
spec:
  selector:
    app: service-node-app
  type: LoadBalancer
  ports:
    - name: http
      port: 3000
      targetPort: 3000